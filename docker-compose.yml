services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: basket_craft_dw
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline -d basket_craft_dw"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
